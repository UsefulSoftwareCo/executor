<!doctype html><meta charset="utf8" /><meta
  name="viewport"
  content="width=device-width,initial-scale=1"
/><title>run</title
><style>
  body {
    font:
      15px/1.55 ui-sans-serif,
      system-ui;
    max-width: 820px;
    margin: 0 auto;
    padding: 24px;
    color: #d7dce5;
    background: #0b0f17;
  }
  a {
    color: #58a6ff;
    text-decoration: none;
  }
  #banner {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 4px;
    color: #8b98a9;
  }
  #banner.ok {
    color: #7ee787;
  }
  #banner.no {
    color: #ff7b72;
  }
  #sub {
    font-size: 12.5px;
    color: #6b7785;
    margin-bottom: 14px;
  }
  .row {
    opacity: 0;
    transform: translateY(6px);
    transition:
      opacity 0.25s,
      transform 0.25s;
    margin: 7px 0;
  }
  .row.in {
    opacity: 1;
    transform: none;
  }
  .u {
    background: #1f6feb;
    color: #fff;
    padding: 0.55rem 0.8rem;
    border-radius: 12px;
    font-weight: 600;
  }
  .a {
    color: #8b98a9;
    padding: 0.3rem 0.8rem;
    border-left: 2px solid #30363d;
  }
  .au {
    background: #1c1606;
    border: 1px solid #5c4813;
    color: #e3b341;
    padding: 0.4rem 0.7rem;
    border-radius: 10px;
    font-size: 13.5px;
  }
  .t {
    background: #0f1620;
    border: 1px solid #21262d;
    border-radius: 10px;
    padding: 0.5rem 0.75rem;
  }
  .t.run {
    border-color: #1f6feb;
  }
  .t .g {
    color: #6b7785;
  }
  .t .sp {
    color: #58a6ff;
    font-style: italic;
  }
  .t .srf {
    font-size: 11px;
    color: #6b7785;
    border: 1px solid #21262d;
    border-radius: 4px;
    padding: 0 0.3rem;
    margin-right: 0.35rem;
    vertical-align: 1px;
  }
  .t pre {
    background: #010409;
    color: #c9d1d9;
    padding: 0.5rem;
    border-radius: 6px;
    margin: 0.4rem 0 0;
    font-size: 12.5px;
    overflow: auto;
    max-height: 280px;
  }
  .st {
    background: #0f1620;
    border: 1px solid #21262d;
    border-radius: 10px;
    padding: 0.5rem 0.75rem;
  }
  .st .lbl {
    font-weight: 600;
  }
  .st img {
    display: block;
    width: 100%;
    margin-top: 0.5rem;
    border: 1px solid #21262d;
    border-radius: 8px;
    cursor: zoom-in;
  }
  .st video {
    display: block;
    width: 100%;
    margin-top: 0.5rem;
    border: 1px solid #21262d;
    border-radius: 8px;
  }
  .term {
    background: #010409;
    color: #c9d1d9;
    font:
      12.5px/1.4 ui-monospace,
      Menlo,
      monospace;
    padding: 0.6rem 0.7rem;
    border: 1px solid #21262d;
    border-radius: 8px;
    margin-top: 0.5rem;
    white-space: pre;
    overflow: auto;
    min-height: 8em;
    max-height: 24em;
  }
  .ledger {
    margin-top: 0.5rem;
    font-size: 12.5px;
  }
  .ledger .le {
    padding: 0.15rem 0.3rem;
    border-bottom: 1px solid #161b22;
    color: #9aa7b6;
  }
  .x {
    padding: 0.2rem 0.8rem;
    font-size: 13.5px;
  }
  .x.ok {
    color: #7ee787;
  }
  .x.no {
    color: #ff7b72;
    font-weight: 700;
  }
  .e {
    color: #ff7b72;
    font-weight: 700;
    padding: 0.4rem 0.8rem;
  }
  .cur {
    display: inline-block;
    width: 7px;
    height: 15px;
    background: #8b98a9;
    vertical-align: -2px;
    animation: b 0.8s steps(1) infinite;
  }
  details {
    margin-top: 0.35rem;
  }
  details summary {
    cursor: pointer;
    color: #6b7785;
    font-size: 12.5px;
  }
  @keyframes b {
    50% {
      opacity: 0;
    }
  }
</style>
<div id="banner">● recording</div>
<div id="sub"></div>
<div id="chat"></div>
<script>
  const RUN = __RUN__;
  const INSTANT = new URLSearchParams(location.search).has("instant");
  const SPEED = INSTANT ? 1e6 : 1;
  const esc = (s) =>
    String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[c]);
  const chat = document.getElementById("chat");
  const add = (html) => {
    const d = document.createElement("div");
    d.innerHTML = html.trim();
    const el = d.firstElementChild;
    el.classList.add("row");
    chat.appendChild(el);
    requestAnimationFrame(() => el.classList.add("in"));
    if (!INSTANT) el.scrollIntoView({ behavior: "smooth", block: "end" });
    return el;
  };
  const sleep = (ms) => new Promise((r) => setTimeout(r, ms / SPEED));
  async function type(el, text) {
    if (INSTANT) {
      el.textContent = text;
      return;
    }
    for (let i = 0; i <= text.length; i++) {
      el.innerHTML = esc(text.slice(0, i)) + "<span class=cur></span>";
      await sleep(16);
    }
    el.innerHTML = esc(text);
  }
  const fmtClip = (ev) =>
    ev.startMs != null
      ? "#t=" +
        (ev.startMs / 1000).toFixed(1) +
        (ev.endMs != null ? "," + (ev.endMs / 1000).toFixed(1) : "")
      : "";

  function evidenceHtml(list) {
    let html = "";
    for (const ev of list ?? []) {
      if (ev.kind === "screenshot")
        html +=
          '<a href="' +
          esc(ev.path) +
          '" target=_blank><img loading=lazy src="' +
          esc(ev.path) +
          '" alt="' +
          esc(ev.label ?? "") +
          '"></a>';
      else if (ev.kind === "video" && ev.startMs == null)
        html += '<video controls preload=metadata src="' + esc(ev.path) + '"></video>';
      else if (ev.kind === "video")
        html +=
          "<details><summary>▶ video clip " +
          (ev.startMs / 1000).toFixed(1) +
          "s–" +
          (ev.endMs != null ? (ev.endMs / 1000).toFixed(1) + "s" : "") +
          '</summary><video controls preload=none src="' +
          esc(ev.path) +
          fmtClip(ev) +
          '"></video></details>';
      else if (ev.kind === "json")
        html +=
          "<details><summary>" +
          esc(ev.label ?? "data") +
          "</summary><pre>" +
          esc(JSON.stringify(ev.data, null, 2)) +
          "</pre></details>";
      else if (ev.kind === "ledger")
        html +=
          "<div class=ledger><b>" +
          esc(ev.service) +
          " emulator saw:</b>" +
          ev.entries
            .map(
              (e) =>
                "<div class=le>" + esc(typeof e === "string" ? e : JSON.stringify(e)) + "</div>",
            )
            .join("") +
          "</div>";
    }
    return html;
  }

  async function playTermFrames(el, frames) {
    const pane = el.querySelector(".term");
    if (!pane || !frames.length) return;
    if (INSTANT) {
      pane.textContent = frames[frames.length - 1].text;
      return;
    }
    let prev = frames[0].t;
    for (const f of frames) {
      await sleep(Math.min(Math.max(f.t - prev, 80), 700));
      prev = f.t;
      pane.textContent = f.text;
    }
  }

  (async () => {
    document.getElementById("sub").textContent = RUN.target + " · " + RUN.scenario;
    await sleep(300);
    for (const t of RUN.turns) {
      if (t.role === "user") {
        add('<div class="u">' + esc(t.text) + "</div>");
        await sleep(700);
      } else if (t.role === "assistant") {
        const el = add('<div class="a"></div>');
        await type(el, t.text);
        await sleep(250);
      } else if (t.role === "auth") {
        add(
          '<div class="au">' +
            (t.phase === "connected" ? "🔓" : "🔐") +
            " " +
            esc(t.text) +
            "</div>",
        );
        await sleep(450);
      } else if (t.role === "tool") {
        const el = add(
          '<div class="t run"><span class=srf>' +
            esc(t.surface) +
            "</span>🔧 <b>" +
            esc(t.call.name) +
            '</b> <span class="sp">running…</span></div>',
        );
        await sleep(700);
        el.classList.remove("run");
        el.innerHTML =
          "<span class=srf>" +
          esc(t.surface) +
          "</span>🔧 <b>" +
          esc(t.call.name) +
          "</b> " +
          (t.ok ? "✓" : "✗") +
          ' <span class="g">→ ' +
          esc(String(t.text).slice(0, 90)) +
          (t.durationMs != null ? " · " + t.durationMs + "ms" : "") +
          "</span><details><summary>args + result</summary><pre>" +
          esc(JSON.stringify({ args: t.call.args, result: t.result }, null, 2)) +
          "</pre></details>" +
          evidenceHtml(t.evidence);
        if (!INSTANT) el.scrollIntoView({ behavior: "smooth", block: "end" });
        await sleep(550);
      } else if (t.role === "step") {
        const hasFrames = (t.evidence ?? []).some((e) => e.kind === "termFrames");
        const el = add(
          '<div class="st"><span class=srf>' +
            esc(t.surface) +
            "</span><span class=lbl>" +
            esc(t.text) +
            "</span>" +
            (hasFrames ? "<div class=term></div>" : "") +
            evidenceHtml((t.evidence ?? []).filter((e) => e.kind !== "termFrames")) +
            "</div>",
        );
        for (const ev of t.evidence ?? [])
          if (ev.kind === "termFrames") await playTermFrames(el, ev.frames);
        if (!INSTANT) el.scrollIntoView({ behavior: "smooth", block: "end" });
        await sleep(600);
      } else if (t.role === "assert") {
        const a = t.assertion;
        add(
          '<div class="x ' +
            (a.ok ? "ok" : "no") +
            '">' +
            (a.ok ? "✅" : "❌") +
            " expect(" +
            esc(JSON.stringify(a.actual)) +
            ")." +
            a.kind +
            "(" +
            esc(JSON.stringify(a.expected)) +
            ")" +
            (a.label ? " — " + esc(a.label) : "") +
            "</div>",
        );
        await sleep(450);
      } else if (t.role === "error") {
        add('<div class="e">💥 ' + esc(t.text) + evidenceHtml(t.evidence) + "</div>");
        await sleep(500);
      }
    }
    await sleep(400);
    const b = document.getElementById("banner");
    b.textContent =
      (RUN.ok ? "✓ PASSED" : "✗ FAILED") +
      " · " +
      RUN.scenario +
      " · " +
      RUN.target +
      " · " +
      (RUN.durationMs ?? 0) +
      "ms";
    b.className = RUN.ok ? "ok" : "no";
    window.__done = true;
  })();
</script>
